name: Deploy static site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build static artifact
        shell: bash
        run: |
          rm -rf pages-dist
          mkdir -p pages-dist
          cp index.html app.js styles.css products-db.js catalog-data.js planner-reference-room.js pages-dist/
          if [ -d images ]; then cp -R images pages-dist/images; fi
          touch pages-dist/.nojekyll
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-dist
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
